name: Zampto Auto Renew

on:
  # 每两天运行一次，UTC 18:18
  schedule:
    - cron: "18 18 */2 * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  renew:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ------------------------------
      # 1️⃣ 检出私有仓库 zam-auto
      # ------------------------------
      - name: Checkout private repo (zam-auto)
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/zam-auto
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: scripts

      # ------------------------------
      # 2️⃣ 安装系统依赖 + hysteria
      # ------------------------------
      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y xvfb curl
          # 下载 hysteria
          curl -L https://github.com/apernet/hysteria/releases/latest/download/hysteria-linux-amd64 -o hysteria
          chmod +x hysteria
          sudo mv hysteria /usr/local/bin/hysteria
          # 确认 hysteria 可用
          hysteria --version

      # ------------------------------
      # 3️⃣ 设置 DISPLAY 环境，保证 Xvfb 可用
      # ------------------------------
      - name: Set DISPLAY
        run: |
          export DISPLAY=:99
        shell: bash

      # ------------------------------
      # 4️⃣ 安装 Python
      # ------------------------------
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ------------------------------
      # 5️⃣ 安装 Python 依赖
      # ------------------------------
      - name: Install Python packages
        working-directory: scripts
        run: |
          pip install --upgrade pip
          pip install seleniumbase pyvirtualdisplay requests

      # ------------------------------
      # 6️⃣ 运行 Zampto 续期脚本
      # ------------------------------
      - name: Run renew script
        working-directory: scripts
        env:
          ZAMPTO_BATCH: ${{ secrets.ZAMPTO_BATCH }}
          HY2_URL: ${{ secrets.HY2_URL }}
          DISPLAY: ":99"
        run: |
          python zampto-renew.py