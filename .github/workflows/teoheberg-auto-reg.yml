name: Buster Register (WARP)

on:
  workflow_dispatch:

  schedule:
    - cron: "0 18 * * *"   # 每天一次

jobs:
  run:
    runs-on: ubuntu-22.04
    timeout-minutes: 30

    steps:
      # =========================
      # 📥 主仓库
      # =========================
      - uses: actions/checkout@v4

      # =========================
      # 📥 私库（核心改动）
      # =========================
      - name: Checkout private repo
        if: ${{ secrets.PRIVATE_REPO_TOKEN }}
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/teoheberg-reg
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: scripts

      # =========================
      # ⚠️ 没拉到直接报错（关键）
      # =========================
      - name: Check scripts
        run: |
          if [ ! -f "scripts/register.js" ]; then
            echo "❌ 没有找到 scripts/register.js"
            exit 1
          fi

      # =========================
      # ⚡ Node
      # =========================
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # =========================
      # 🟡 WARP
      # =========================
      - name: 创建WARP网络
        uses: fscarmen/warp-on-actions@v1.3
        with:
          stack: dual
          mode: client

      # =========================
      # 🟡 系统依赖（补浏览器）
      # =========================
      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            xvfb wget unzip curl jq p7zip-full \
            pulseaudio alsa-utils ffmpeg \
            libnss3 libgtk-3-0 libgbm1

          pulseaudio --start --exit-idle-time=-1 || true

          pactl load-module module-null-sink sink_name=virtual_speaker || true
          pactl set-default-sink virtual_speaker || true

          pactl load-module module-virtual-source source_name=virtual_mic || true
          pactl set-default-source virtual_mic || true

      # =========================
      # 🟡 Playwright
      # =========================
      - name: Install playwright
        run: |
          npm init -y
          npm install playwright
          npx playwright install chromium
          npx playwright install-deps

      # =========================
      # 🟡 Buster
      # =========================
      - name: Download Buster
        run: |
          mkdir -p extensions/buster
          wget -O extensions/buster/buster.zip \
            https://github.com/dessant/buster/releases/download/v3.1.0/buster_captcha_solver_for_humans-3.1.0-chrome.zip

      - name: Unzip Buster
        run: |
          mkdir -p extensions/buster/unpacked
          7z x -y extensions/buster/buster.zip -oextensions/buster/unpacked

      # =========================
      # 🟡 IP 调试
      # =========================
      - name: Check IP
        run: |
          echo "🌍 当前 IP:"
          curl -s https://api.ipify.org
          echo
          curl -s https://ipinfo.io

      # =========================
      # 🟡 运行脚本（唯一关键改动）
      # =========================
      - name: Run script
        run: |
          mkdir -p screenshots
          xvfb-run -a node scripts/register.js

      # =========================
      # 🟡 上传截图
      # =========================
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: screenshots
          path: |
            screenshots/*
            scripts/screenshots/*