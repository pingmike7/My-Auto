name: AxentHost Auto Claim

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  claim:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ✅ 检出私库
      - name: Checkout private repo (axenthost-auto)
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/axenthost-auto
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: scripts

      # ✅ 恢复 cookies 缓存
      - name: Restore cookies cache
        uses: actions/cache@v4
        with:
          path: scripts/cookies
          key: axent-cookies
          restore-keys: |
            axent-cookies

      # 🐍 安装 Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # 📦 安装依赖
      - name: Install dependencies
        working-directory: scripts
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb
          pip install --upgrade pip
          pip install -r requirements.txt -q

      # 🚀 运行脚本
      - name: Run AxentHost claim script
        working-directory: scripts
        env:
          AXENT_BATCH: ${{ secrets.AXENT_BATCH }}
        run: |
          python axent_claim.py

      # ✅ 保存 cookies 缓存
      - name: Save cookies cache
        uses: actions/cache@v4
        with:
          path: scripts/cookies
          key: axent-cookies